<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Germany Agricultural Prices — 3D Visualisation</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ─────────────────────────────────── -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">FAO</div>
        <div>
          <h2>Germany</h2>
          <p>Producer Prices · 1991–2022</p>
        </div>
      </div>

      <div class="sidebar-section">
        <label>Dataset</label>
        <div class="dataset-toggle">
          <button class="ds-btn active" data-dataset="producer">Producer</button>
          <button class="ds-btn" data-dataset="cpi">Consumer</button>
        </div>
      </div>

      <div class="sidebar-section">
        <label for="category-filter">Category</label>
        <select id="category-filter">
          <option value="All">All Categories</option>
          <option value="Milk & Dairy">Milk &amp; Dairy</option>
          <option value="Meat">Meat</option>
          <option value="Vegetables">Vegetables</option>
          <option value="Fruits">Fruits</option>
          <option value="Cereals & Grains">Cereals &amp; Grains</option>
          <option value="Pulses & Legumes">Pulses &amp; Legumes</option>
          <option value="Oilseeds & Oils">Oilseeds &amp; Oils</option>
          <option value="Sweeteners">Sweeteners</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="sidebar-section sidebar-actions">
        <button id="btn-select-all">All</button>
        <button id="btn-first-8">Top 8</button>
        <button id="btn-clear">Clear</button>
      </div>

      <div class="sidebar-section food-list-wrap">
        <label>Items</label>
        <div id="food-list"></div>
      </div>

      <div class="sidebar-footer">
        <p>Source: FAOSTAT · Unit: LCU/tonne</p>
      </div>
    </aside>

    <!-- ── Main area ───────────────────────────────── -->
    <main id="main">

      <header id="topbar">
        <h1 id="page-title">Germany Agricultural Producer Prices</h1>
        <nav id="viz-tabs">
          <button class="tab-btn active" data-viz="1">
            <span class="tab-icon">&#9646;&#9646;&#9646;</span>
            3D Bar Matrix
          </button>
          <button class="tab-btn" data-viz="2">
            <span class="tab-icon">&#9650;</span>
            Price Terrain
          </button>
          <button class="tab-btn" data-viz="3">
            <span class="tab-icon">&#9679;</span>
            Bubble Orbs
          </button>
          <button class="tab-btn" data-viz="4" id="tab-inflation" style="display:none">
            <span class="tab-icon">&#9650;</span>
            Inflation
          </button>
        </nav>
      </header>

      <div id="controls-bar">
        <div class="control-group" id="range-control">
          <label>Year range</label>
          <div class="year-range">
            <span id="year-start-label">1991</span>
            <input type="range" id="sl-start" min="0" max="31" value="0">
            <input type="range" id="sl-end"   min="0" max="31" value="31">
            <span id="year-end-label">2022</span>
          </div>
        </div>

        <div class="control-group" id="time-control" style="display:none">
          <label>Year: <span id="time-year-label">2022</span></label>
          <input type="range" id="sl-time" min="0" max="31" value="31">
          <button id="btn-animate" title="Play / Pause">&#9654;</button>
        </div>

        <div class="control-group" id="crisis-control" style="display:none">
          <label>Crisis Period</label>
          <div class="crisis-btns">
            <button class="crisis-btn active" data-crisis="">None</button>
            <button class="crisis-btn" data-crisis="eur">
              EUR Switch<br><small>2001–2002</small>
            </button>
            <button class="crisis-btn" data-crisis="covid">
              COVID-19<br><small>2020–2022</small>
            </button>
          </div>
        </div>
      </div>

      <div id="canvas-container">
        <canvas id="three-canvas"></canvas>
        <div id="tooltip" class="hidden"></div>
        <div id="loading">Loading data…</div>
      </div>

      <footer id="legend"></footer>

    </main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
