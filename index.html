<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germany Food Producer Prices 1991-2022</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="picker-wrap">
    <div>
      <label class="picker-label" for="food-select">Foods (Ctrl/Cmd + click for multi-select)</label>
      <div style="display:flex; gap:8px; margin-bottom:6px; align-items:center; flex-wrap:wrap;">
        <label class="picker-label" for="category-filter" style="margin-bottom:0;">Category</label>
        <select id="category-filter" class="picker-filter">
          <option value="All">All categories</option>
        </select>
      </div>
      <!-- Hidden select: JS still needs this for its event listeners and data sync -->
      <select id="food-select" style="display:none" multiple></select>
      <!-- Visible replacement: we build this with renderFoodList() in JS -->
      <div id="food-select-list" class="food-list"></div>
    </div>
    <div class="picker-actions">
      <button type="button" class="picker-btn" id="btn-select-all">Select all</button>
      <button type="button" class="picker-btn" id="btn-first-8">First 8</button>
      <button type="button" class="picker-btn" id="btn-select-category">Select category</button>
      <button type="button" class="picker-btn" id="btn-clear-category">Clear category</button>
    </div>
  </div>
    </aside>
    <main class="main-content">
<div class="container">
  <h1>FAOSTAT Germany Producer Prices Visualisation</h1>
  <div class="subtitle"></div>
  <div class="mode-btn-row">
    <button type="button" class="mode-btn" id="toggle-basket">Basket Mode</button>
    <button type="button" class="mode-btn" id="toggle-3d-view">3D View</button>
    <button type="button" class="mode-btn" id="toggle-indexed">Indexed View</button>
  </div>

  <div class="legend" id="legend" style="min-height: 18px;"></div>

  <div class="chart-wrap">
    <svg id="mainChart" role="img"
      aria-label="Line chart of German food producer prices 1991–2022">
    </svg>
  </div>
  <div class="range-row">
    <span>From</span>
    <input type="range" id="sl-start" min="0" max="31" value="0" step="1">
    <span class="range-lbl" id="lbl-start">1991</span>
    <span class="range-arrow">→</span>
    <input type="range" id="sl-end" min="0" max="31" value="31" step="1">
    <span class="range-lbl" id="lbl-end">2022</span>
  </div>

  <div class="rolling-avg-wrap">
    <label>
      <input type="checkbox" id="toggle-rolling-avg">
      <span>Show rolling average</span>
    </label>
    <label for="rolling-window" style="margin-left: 8px;">Window (years):</label>
    <input type="number" id="rolling-window" class="rolling-avg-window" value="3" min="2" max="10">
  </div>
  <div class="chart-caption">
    <div class="chart-title">Category price change</div>
    <div class="chart-note">Stacked year-over-year change by category for the selected foods.</div>
  </div>

  <div class="chart-wrap secondary">
    <svg id="stackedChart" role="img"
      aria-label="Stacked bar chart of yearly category price changes">
    </svg>
  </div>

  

  

  <div class="pills" id="pills"></div>

  <div class="ar-row">
    <button type="button" id="btn-ar" class="ar-btn">View in AR</button>
    <span class="ar-note" id="ar-note">Opens your camera with a price chart overlay</span>
  </div>
</div>

<!-- Full-screen AR overlay: sits on top of everything when active -->
<div id="ar-overlay" class="ar-overlay" style="display:none;">
  <!-- The live camera feed plays here as a background -->
  <video id="ar-video" autoplay playsinline muted></video>
  <!-- We draw our chart on this transparent canvas, layered over the video -->
  <canvas id="ar-canvas"></canvas>
  <div class="ar-hud">
    <span class="ar-label-badge">AR · Food Prices</span>
    <button type="button" id="ar-close" class="ar-close-btn">Exit AR</button>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/app.js"></script>
</main>
  </div>
</body>
</html>
